<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Looks by Lucian Alecu — Programări</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#121212;
    --card:#1c1c1c;
    --card2:#242424;
    --line:#333333;
    --gold:#d4a843;
    --gold-dim:#8a6f2e;
    --text:#f2ede2;
    --muted:#9a9690;
    --danger:#c9564f;
    --ok:#5f9e6e;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
  h1,h2,h3{font-family:'Fraunces',serif;margin:0;font-weight:600;}
  .screen{display:none;min-height:100vh;flex-direction:column;}
  .screen.active{display:flex;}
  /* AUTH */
  #authScreen{align-items:center;justify-content:center;padding:24px;}
  .authBox{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 24px;}
  .authBox h1{font-size:26px;color:var(--gold);text-align:center;}
  .authBox p.sub{text-align:center;color:var(--muted);margin:6px 0 22px;font-size:13px;}
  .tabs{display:flex;background:var(--card2);border-radius:10px;padding:4px;margin-bottom:20px;}
  .tabs button{flex:1;background:transparent;border:none;color:var(--muted);padding:10px;border-radius:8px;font-weight:600;font-size:14px;cursor:pointer;}
  .tabs button.on{background:var(--gold);color:#1a1a1a;}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px;}
  input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:var(--card2);color:var(--text);font-size:15px;font-family:'Inter',sans-serif;}
  input:focus{outline:none;border-color:var(--gold);}
  .btn{margin-top:22px;width:100%;padding:13px;border:none;border-radius:10px;background:var(--gold);color:#1a1a1a;font-weight:700;font-size:15px;cursor:pointer;}
  .btn.secondary{background:transparent;border:1px solid var(--line);color:var(--text);}
  .btn.danger{background:var(--danger);color:#fff;}
  .btn:disabled{opacity:0.5;}
  .err{color:var(--danger);font-size:13px;margin-top:10px;min-height:16px;}
  /* APP */
  #appScreen{}
  header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:10;}
  header h2{font-size:18px;color:var(--gold);}
  header .logout{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;}
  .navtabs{display:flex;border-bottom:1px solid var(--line);}
  .navtabs button{flex:1;padding:14px;background:none;border:none;color:var(--muted);font-weight:600;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;}
  .navtabs button.on{color:var(--gold);border-bottom-color:var(--gold);}
  main{flex:1;padding:18px;padding-bottom:40px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
  .frizeriRow{display:flex;gap:10px;margin-bottom:18px;}
  .frizerCard{flex:1;padding:16px 10px;text-align:center;border-radius:14px;border:1px solid var(--line);background:var(--card);cursor:pointer;}
  .frizerCard.on{border-color:var(--gold);background:var(--card2);}
  .frizerCard .ini{width:46px;height:46px;border-radius:50%;background:var(--gold-dim);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:18px;margin:0 auto 8px;}
  .frizerCard.on .ini{background:var(--gold);color:#1a1a1a;}
  .frizerCard div.nume{font-weight:600;font-size:14px;}
  .sectionTitle{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin:20px 0 10px;}
  .servRow{display:flex;justify-content:space-between;align-items:center;padding:14px;border:1px solid var(--line);border-radius:12px;margin-bottom:10px;cursor:pointer;background:var(--card);}
  .servRow.on{border-color:var(--gold);background:var(--card2);}
  .servRow .info .nume{font-weight:600;font-size:15px;}
  .servRow .info .sub{color:var(--muted);font-size:12px;margin-top:2px;}
  .servRow .pret{font-weight:700;color:var(--gold);font-size:15px;}
  .plusCircle{width:30px;height:30px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--muted);}
  .servRow.on .plusCircle{background:var(--gold);color:#1a1a1a;border-color:var(--gold);}
  .sumBar{position:sticky;bottom:0;background:var(--card2);border-top:1px solid var(--line);padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin:0 -18px -40px;}
  .sumBar .txt{font-size:13px;color:var(--muted);}
  .sumBar .txt b{color:var(--text);font-size:15px;}
  .sumBar button{background:var(--gold);color:#1a1a1a;border:none;padding:11px 22px;border-radius:10px;font-weight:700;cursor:pointer;}
  .sumBar button:disabled{opacity:0.4;}
  .slotsGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
  .slot{padding:10px 4px;text-align:center;border:1px solid var(--line);border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;}
  .slot.on{background:var(--gold);color:#1a1a1a;border-color:var(--gold);}
  .empty{color:var(--muted);text-align:center;padding:30px 10px;font-size:14px;}
  .apptItem{border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:12px;background:var(--card);}
  .apptItem .top{display:flex;justify-content:space-between;align-items:flex-start;}
  .apptItem .data{font-weight:700;font-size:15px;}
  .apptItem .status{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700;text-transform:uppercase;}
  .status.activa{background:rgba(212,168,67,0.15);color:var(--gold);}
  .status.finalizata{background:rgba(95,158,110,0.15);color:var(--ok);}
  .status.anulata{background:rgba(201,86,79,0.15);color:var(--danger);}
  .apptItem .det{color:var(--muted);font-size:13px;margin-top:6px;line-height:1.5;}
  .apptItem .cancel{margin-top:10px;background:none;border:1px solid var(--danger);color:var(--danger);padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;}
  .backBtn{background:none;border:none;color:var(--muted);font-size:14px;margin-bottom:14px;cursor:pointer;display:flex;align-items:center;gap:6px;}
  .modalBg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;align-items:flex-end;justify-content:center;}
  .modalBg.active{display:flex;}
  .modalBox{background:var(--card);border-radius:18px 18px 0 0;padding:26px 22px 30px;width:100%;max-width:420px;}
  .modalBox h3{color:var(--gold);margin-bottom:14px;}
  .modalBox .row{display:flex;justify-content:space-between;font-size:14px;padding:8px 0;border-bottom:1px solid var(--line);color:var(--muted);}
  .modalBox .row b{color:var(--text);}
  .spinner{border:2px solid var(--line);border-top:2px solid var(--gold);border-radius:50%;width:16px;height:16px;animation:spin 0.7s linear infinite;display:inline-block;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" class="screen active">
  <div class="authBox">
    <h1>Looks by Lucian Alecu</h1>
    <p class="sub">Programează-te online în câteva secunde</p>
    <div class="tabs">
      <button id="tabLogin" class="on" onclick="switchAuthTab('login')">Autentificare</button>
      <button id="tabSignup" onclick="switchAuthTab('signup')">Cont nou</button>
    </div>

    <div id="loginForm">
      <label>Email</label>
      <input type="email" id="loginEmail" autocomplete="email" placeholder="nume@exemplu.ro">
      <label>Parolă</label>
      <input type="password" id="loginPass" autocomplete="current-password" placeholder="••••••••">
      <button class="btn" id="btnLogin" onclick="doLogin()">Intră în cont</button>
      <div class="err" id="loginErr"></div>
    </div>

    <div id="signupForm" style="display:none;">
      <label>Nume complet</label>
      <input type="text" id="suNume" placeholder="Popescu Ion">
      <label>Telefon</label>
      <input type="tel" id="suTel" placeholder="07xxxxxxxx">
      <label>Email</label>
      <input type="email" id="suEmail" autocomplete="email" placeholder="nume@exemplu.ro">
      <label>Parolă</label>
      <input type="password" id="suPass" autocomplete="new-password" placeholder="minim 6 caractere">
      <button class="btn" id="btnSignup" onclick="doSignup()">Creează cont</button>
      <div class="err" id="signupErr"></div>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="appScreen" class="screen">
  <header>
    <h2>Looks by Lucian Alecu</h2>
    <button class="logout" onclick="doLogout()">Ieși din cont</button>
  </header>
  <div class="navtabs">
    <button id="navBook" class="on" onclick="switchNav('book')">Programează</button>
    <button id="navMine" onclick="switchNav('mine')">Programările mele</button>
  </div>

  <main>
    <!-- BOOK TAB -->
    <div id="bookTab">
      <div id="stepFrizer">
        <div class="sectionTitle">Alege frizerul</div>
        <div class="frizeriRow" id="frizeriRow"></div>

        <div class="sectionTitle">Alege data</div>
        <input type="date" id="dataInput" onchange="onDateChange()">
        <div id="dataInfo" style="color:var(--muted);font-size:12px;margin-top:6px;"></div>

        <div class="sectionTitle">Selectează serviciile</div>
        <div id="serviciiList"></div>
      </div>

      <div id="stepSlots" style="display:none;">
        <button class="backBtn" onclick="backToServices()">← Înapoi la servicii</button>
        <div class="sectionTitle">Ore disponibile</div>
        <div id="slotsWrap"></div>
      </div>
    </div>

    <!-- MINE TAB -->
    <div id="mineTab" style="display:none;">
      <div id="mineList"></div>
    </div>
  </main>

  <div class="sumBar" id="sumBar" style="display:none;">
    <div class="txt">Total: <b id="sumPret">0 RON</b> · <span id="sumDurata">0 min</span></div>
    <button id="btnContinua" onclick="showSlots()">Continuă</button>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modalBg" id="confirmModal">
  <div class="modalBox">
    <h3>Confirmă programarea</h3>
    <div class="row"><span>Frizer</span><b id="cfFrizer"></b></div>
    <div class="row"><span>Data</span><b id="cfData"></b></div>
    <div class="row"><span>Ora</span><b id="cfOra"></b></div>
    <div class="row"><span>Servicii</span><b id="cfServicii"></b></div>
    <div class="row"><span>Total</span><b id="cfTotal"></b></div>
    <button class="btn" id="btnConfirma" onclick="confirmaProgramare()">Confirmă programarea</button>
    <button class="btn secondary" onclick="closeModal()">Anulează</button>
    <div class="err" id="cfErr"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyAF-7h6_G5rz9wcyliSBF1ag7HqJu2zhNc",
  authDomain: "baby-white-noise-bc63d.firebaseapp.com",
  databaseURL: "https://baby-white-noise-bc63d.firebaseio.com",
  projectId: "baby-white-noise-bc63d",
  storageBucket: "baby-white-noise-bc63d.firebasestorage.app",
  messagingSenderId: "114240488049",
  appId: "1:114240488049:web:64fba858033092e775d1d0",
  measurementId: "G-7G3KKEFNQX"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// ---------- CONFIG SALON ----------
const FRIZERI = {
  lucian: { nume: "Lucian Alecu", initiale: "LA" },
  teodor: { nume: "Teodor", initiale: "T" }
};
const SERVICII = [
  { id:"tuns", nume:"Tuns", durata:30, pret:50 },
  { id:"tuns_barba", nume:"Tuns+Barbă", durata:45, pret:70 },
  { id:"tuns_spalat", nume:"Tuns+Spălat", durata:45, pret:65 },
  { id:"tuns_barba_spalat", nume:"Tuns+Barbă+Spălat", durata:60, pret:85 },
  { id:"tuns_barba_scurt", nume:"Tuns Barbă", durata:15, pret:35 }
];
// program: 0=Duminica,1=Luni,...6=Sambata
const PROGRAM = {
  0: {start:"09:00", end:"17:00"},
  1: null, // inchis
  2: {start:"09:00", end:"20:30"},
  3: {start:"09:00", end:"20:30"},
  4: {start:"09:00", end:"20:30"},
  5: {start:"09:00", end:"20:30"},
  6: {start:"09:00", end:"20:30"}
};
const SLOT_STEP = 15; // minute

// ---------- STATE ----------
let currentUser = null;
let userData = null;
let selFrizer = null;
let selServicii = new Set();
let selData = null;
let selOra = null;

// ---------- AUTH ----------
function switchAuthTab(tab){
  document.getElementById('tabLogin').classList.toggle('on', tab==='login');
  document.getElementById('tabSignup').classList.toggle('on', tab==='signup');
  document.getElementById('loginForm').style.display = tab==='login' ? 'block' : 'none';
  document.getElementById('signupForm').style.display = tab==='signup' ? 'block' : 'none';
}

function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if(!email || !pass){ errEl.textContent = 'Completează email și parolă.'; return; }
  document.getElementById('btnLogin').disabled = true;
  auth.signInWithEmailAndPassword(email, pass)
    .catch(e => { errEl.textContent = mesajEroare(e); })
    .finally(() => { document.getElementById('btnLogin').disabled = false; });
}

function doSignup(){
  const nume = document.getElementById('suNume').value.trim();
  const tel = document.getElementById('suTel').value.trim();
  const email = document.getElementById('suEmail').value.trim();
  const pass = document.getElementById('suPass').value;
  const errEl = document.getElementById('signupErr');
  errEl.textContent = '';
  if(!nume || !tel || !email || !pass){ errEl.textContent = 'Completează toate câmpurile.'; return; }
  if(tel.length < 9){ errEl.textContent = 'Număr de telefon invalid.'; return; }
  if(pass.length < 6){ errEl.textContent = 'Parola trebuie să aibă minim 6 caractere.'; return; }
  document.getElementById('btnSignup').disabled = true;
  auth.createUserWithEmailAndPassword(email, pass)
    .then(cred => {
      return db.ref('useri/' + cred.user.uid).set({ nume, telefon: tel, email });
    })
    .catch(e => { errEl.textContent = mesajEroare(e); })
    .finally(() => { document.getElementById('btnSignup').disabled = false; });
}

function mesajEroare(e){
  const m = {
    'auth/email-already-in-use': 'Există deja un cont cu acest email.',
    'auth/invalid-email': 'Email invalid.',
    'auth/weak-password': 'Parola este prea slabă.',
    'auth/user-not-found': 'Nu există cont cu acest email.',
    'auth/wrong-password': 'Parolă greșită.',
    'auth/invalid-credential': 'Email sau parolă incorectă.',
    'auth/too-many-requests': 'Prea multe încercări. Așteaptă puțin.'
  };
  return m[e.code] || ('Eroare: ' + e.message);
}

function doLogout(){ auth.signOut(); }

auth.onAuthStateChanged(user => {
  if(user){
    currentUser = user;
    db.ref('useri/' + user.uid).once('value').then(snap => {
      userData = snap.val() || {};
      afiseazaApp();
    });
  } else {
    currentUser = null; userData = null;
    document.getElementById('authScreen').classList.add('active');
    document.getElementById('appScreen').classList.remove('active');
  }
});

// ---------- APP UI ----------
function afiseazaApp(){
  document.getElementById('authScreen').classList.remove('active');
  document.getElementById('appScreen').classList.add('active');
  renderFrizeri();
  renderServicii();
  const today = new Date();
  document.getElementById('dataInput').min = ymd(today);
  document.getElementById('dataInput').value = ymd(today);
  selData = ymd(today);
  onDateChange();
  switchNav('book');
}

function switchNav(tab){
  document.getElementById('navBook').classList.toggle('on', tab==='book');
  document.getElementById('navMine').classList.toggle('on', tab==='mine');
  document.getElementById('bookTab').style.display = tab==='book' ? 'block' : 'none';
  document.getElementById('mineTab').style.display = tab==='mine' ? 'block' : 'none';
  document.getElementById('sumBar').style.display = (tab==='book' && document.getElementById('stepSlots').style.display==='none') ? 'flex' : 'none';
  if(tab==='mine') incarcaProgramarileMele();
}

function renderFrizeri(){
  const wrap = document.getElementById('frizeriRow');
  wrap.innerHTML = '';
  Object.keys(FRIZERI).forEach(id => {
    const f = FRIZERI[id];
    const div = document.createElement('div');
    div.className = 'frizerCard' + (selFrizer===id ? ' on' : '');
    div.onclick = () => { selFrizer = id; renderFrizeri(); onDateChange(); };
    div.innerHTML = `<div class="ini">${f.initiale}</div><div class="nume">${f.nume}</div>`;
    wrap.appendChild(div);
  });
  if(!selFrizer){ selFrizer = Object.keys(FRIZERI)[0]; }
}

function renderServicii(){
  const wrap = document.getElementById('serviciiList');
  wrap.innerHTML = '';
  SERVICII.forEach(s => {
    const div = document.createElement('div');
    div.className = 'servRow' + (selServicii.has(s.id) ? ' on' : '');
    div.onclick = () => { toggleServiciu(s.id); };
    div.innerHTML = `<div class="info"><div class="nume">${s.nume}</div><div class="sub">${s.durata} min.</div></div>
      <div style="display:flex;align-items:center;gap:12px;"><div class="pret">${s.pret} RON</div><div class="plusCircle">${selServicii.has(s.id)?'✓':'+'}</div></div>`;
    wrap.appendChild(div);
  });
  updateSumBar();
}

function toggleServiciu(id){
  if(selServicii.has(id)) selServicii.delete(id); else selServicii.add(id);
  renderServicii();
}

function updateSumBar(){
  const arr = SERVICII.filter(s => selServicii.has(s.id));
  const total = arr.reduce((a,s)=>a+s.pret,0);
  const durata = arr.reduce((a,s)=>a+s.durata,0);
  document.getElementById('sumPret').textContent = total + ' RON';
  document.getElementById('sumDurata').textContent = durata + ' min';
  document.getElementById('btnContinua').disabled = arr.length===0;
  document.getElementById('sumBar').style.display = 'flex';
}

function onDateChange(){
  selData = document.getElementById('dataInput').value;
  const d = new Date(selData + 'T00:00:00');
  const info = document.getElementById('dataInfo');
  const prog = PROGRAM[d.getDay()];
  info.textContent = prog ? `Program: ${prog.start} - ${prog.end}` : 'Închis în această zi (Luni).';
}

function ymd(d){
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

// ---------- SLOTS ----------
function toMin(hhmm){ const [h,m] = hhmm.split(':').map(Number); return h*60+m; }
function toHHMM(min){ const h = Math.floor(min/60), m = min%60; return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); }

function showSlots(){
  if(selServicii.size===0) return;
  const d = new Date(selData + 'T00:00:00');
  const prog = PROGRAM[d.getDay()];
  document.getElementById('stepFrizer').style.display = 'none';
  document.getElementById('stepSlots').style.display = 'block';
  document.getElementById('sumBar').style.display = 'none';
  const wrap = document.getElementById('slotsWrap');
  wrap.innerHTML = '<div class="empty"><span class="spinner"></span> Se încarcă orele disponibile...</div>';

  if(!prog){
    wrap.innerHTML = '<div class="empty">Salonul este închis în ziua selectată.</div>';
    return;
  }
  const durataTotal = SERVICII.filter(s=>selServicii.has(s.id)).reduce((a,s)=>a+s.durata,0);

  db.ref('programari/' + selFrizer).orderByChild('data').equalTo(selData).once('value').then(snap => {
    const ocupat = [];
    snap.forEach(c => {
      const v = c.val();
      if(v.status !== 'anulata'){
        ocupat.push([toMin(v.oraStart), toMin(v.oraEnd)]);
      }
    });
    const start = toMin(prog.start);
    const end = toMin(prog.end);
    const now = new Date();
    const esteAzi = selData === ymd(now);
    const acumMin = now.getHours()*60 + now.getMinutes();

    const sloturi = [];
    for(let t = start; t + durataTotal <= end; t += SLOT_STEP){
      if(esteAzi && t <= acumMin) continue;
      const suprapune = ocupat.some(([os,oe]) => t < oe && (t+durataTotal) > os);
      if(!suprapune) sloturi.push(t);
    }
    if(sloturi.length===0){
      wrap.innerHTML = '<div class="empty">Nu mai există ore libere pentru serviciile alese în această zi. Încearcă altă zi sau alt frizer.</div>';
      return;
    }
    wrap.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'slotsGrid';
    sloturi.forEach(t => {
      const el = document.createElement('div');
      el.className = 'slot';
      el.textContent = toHHMM(t);
      el.onclick = () => deschideConfirmare(t, durataTotal);
      grid.appendChild(el);
    });
    wrap.appendChild(grid);
  });
}

function backToServices(){
  document.getElementById('stepFrizer').style.display = 'block';
  document.getElementById('stepSlots').style.display = 'none';
  document.getElementById('sumBar').style.display = 'flex';
}

// ---------- CONFIRMARE ----------
let pendingBooking = null;
function deschideConfirmare(startMin, durataTotal){
  const arr = SERVICII.filter(s => selServicii.has(s.id));
  const pretTotal = arr.reduce((a,s)=>a+s.pret,0);
  const endMin = startMin + durataTotal;
  pendingBooking = {
    frizerId: selFrizer,
    data: selData,
    oraStart: toHHMM(startMin),
    oraEnd: toHHMM(endMin),
    servicii: arr.map(s => ({nume:s.nume, durata:s.durata, pret:s.pret})),
    durataTotal, pretTotal
  };
  document.getElementById('cfFrizer').textContent = FRIZERI[selFrizer].nume;
  document.getElementById('cfData').textContent = formatDataRo(selData);
  document.getElementById('cfOra').textContent = pendingBooking.oraStart + ' - ' + pendingBooking.oraEnd;
  document.getElementById('cfServicii').textContent = arr.map(s=>s.nume).join(', ');
  document.getElementById('cfTotal').textContent = pretTotal + ' RON';
  document.getElementById('cfErr').textContent = '';
  document.getElementById('confirmModal').classList.add('active');
}
function closeModal(){ document.getElementById('confirmModal').classList.remove('active'); }

function confirmaProgramare(){
  if(!pendingBooking) return;
  document.getElementById('btnConfirma').disabled = true;
  const apptRef = db.ref('programari/' + pendingBooking.frizerId).push();
  const data = Object.assign({}, pendingBooking, {
    uid: currentUser.uid,
    nume: userData.nume || '',
    telefon: userData.telefon || '',
    status: 'activa',
    creatLa: firebase.database.ServerValue.TIMESTAMP
  });
  const updates = {};
  updates['programari/' + pendingBooking.frizerId + '/' + apptRef.key] = data;
  updates['programariClienti/' + currentUser.uid + '/' + apptRef.key] = Object.assign({}, data, {apptId: apptRef.key});
  db.ref().update(updates).then(() => {
    closeModal();
    selServicii.clear();
    document.getElementById('stepFrizer').style.display = 'block';
    document.getElementById('stepSlots').style.display = 'none';
    renderServicii();
    switchNav('mine');
  }).catch(e => {
    document.getElementById('cfErr').textContent = 'Eroare la salvare: ' + e.message;
  }).finally(() => {
    document.getElementById('btnConfirma').disabled = false;
  });
}

function formatDataRo(dstr){
  const zile = ['Duminică','Luni','Marți','Miercuri','Joi','Vineri','Sâmbătă'];
  const luni = ['ian','feb','mar','apr','mai','iun','iul','aug','sep','oct','noi','dec'];
  const d = new Date(dstr + 'T00:00:00');
  return zile[d.getDay()] + ', ' + d.getDate() + ' ' + luni[d.getMonth()];
}

// ---------- PROGRAMARILE MELE ----------
function incarcaProgramarileMele(){
  const wrap = document.getElementById('mineList');
  wrap.innerHTML = '<div class="empty"><span class="spinner"></span> Se încarcă...</div>';
  db.ref('programariClienti/' + currentUser.uid).once('value').then(snap => {
    const items = [];
    snap.forEach(c => items.push(Object.assign({apptId:c.key}, c.val())));
    items.sort((a,b) => (b.data+b.oraStart).localeCompare(a.data+a.oraStart));
    if(items.length===0){
      wrap.innerHTML = '<div class="empty">Nu ai nicio programare încă.</div>';
      return;
    }
    wrap.innerHTML = '';
    items.forEach(it => {
      const div = document.createElement('div');
      div.className = 'apptItem';
      const poateAnula = it.status === 'activa';
      div.innerHTML = `
        <div class="top">
          <div class="data">${formatDataRo(it.data)} · ${it.oraStart}</div>
          <div class="status ${it.status}">${it.status}</div>
        </div>
        <div class="det">
          Frizer: ${FRIZERI[it.frizerId] ? FRIZERI[it.frizerId].nume : it.frizerId}<br>
          Servicii: ${(it.servicii||[]).map(s=>s.nume).join(', ')}<br>
          Total: ${it.pretTotal} RON
        </div>
        ${poateAnula ? `<button class="cancel" onclick="anuleazaProgramare('${it.frizerId}','${it.apptId}')">Anulează programarea</button>` : ''}
      `;
      wrap.appendChild(div);
    });
  });
}

function anuleazaProgramare(frizerId, apptId){
  if(!confirm('Sigur vrei să anulezi această programare?')) return;
  const updates = {};
  updates['programari/' + frizerId + '/' + apptId + '/status'] = 'anulata';
  updates['programariClienti/' + currentUser.uid + '/' + apptId + '/status'] = 'anulata';
  db.ref().update(updates).then(() => incarcaProgramarileMele());
}
